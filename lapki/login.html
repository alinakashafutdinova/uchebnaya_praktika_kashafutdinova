<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — приют «Лапки»</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="">
<div id="header"></div>

<div class="container">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Вход в кабинет</h1>
      <p class="sub">Войдите как волонтёр или администратор приюта.</p>

      <div class="demo-note">
        Демо-доступ:<br>
        <b>Админ</b> — admin@lapki.ru / admin<br>
        <b>Волонтёр</b> — volonter@lapki.ru / volonter
      </div>

      <div class="alert" id="err" style="background:#fbe3dc;border-color:#e7b3a6;color:#a23a22"></div>

      <div class="field" id="f-email">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
      </div>
      <div class="field" id="f-pass">
        <label for="pass">Пароль</label>
        <input type="password" id="pass" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btn" style="width:100%;justify-content:center">Войти</button>

      <p class="switch">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  if(Auth.current()) location.href = "cabinet.html";

  function submit(){
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const res = Auth.login(email, pass);
    const err = document.getElementById("err");
    if(res.ok){ location.href = "cabinet.html"; }
    else { err.textContent = res.error; err.classList.add("show"); }
  }
  document.getElementById("btn").addEventListener("click", submit);
  document.getElementById("pass").addEventListener("keydown", e => { if(e.key==="Enter") submit(); });
</script>
</body>
</html>
