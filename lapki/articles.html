<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статьи — приют «Лапки»</title>
<meta name="description" content="Статьи об уходе, кормлении и адаптации животных от приюта «Лапки».">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="articles.html">
<div id="header"></div>

<section class="section"><div class="container">
  <div class="breadcrumb" style="padding-top:0;padding-bottom:14px"><a href="index.html">Главная</a> / Статьи</div>
  <div class="sec-head"><div>
    <div class="kicker">Полезное</div>
    <h2>Статьи об уходе за питомцами</h2>
  </div></div>
  <div class="article-grid" id="grid"></div>
</div></section>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById("grid").innerHTML = Store.articles().map(a=>`
    <a class="article-card" href="article.html?id=${a.id}">
      <span class="cat">${a.cat}</span>
      <h3>${a.title}</h3>
      <p class="excerpt">${a.excerpt}</p>
      <div class="meta"><span>${a.author}</span>·<span>${a.date}</span>·<span>${a.read}</span></div>
    </a>`).join("");
</script>
</body>
</html>
