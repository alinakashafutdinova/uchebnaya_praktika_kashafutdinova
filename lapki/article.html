<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статья — приют «Лапки»</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="articles.html">
<div id="header"></div>

<div class="container">
  <div class="breadcrumb"><a href="index.html">Главная</a> / <a href="articles.html">Статьи</a> / <span id="crumb">Статья</span></div>
  <article class="prose" id="article"></article>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  const id = +getParam("id");
  const a = LAPKI.ARTICLES.find(x=>x.id===id);
  const box = document.getElementById("article");

  if(!a){
    box.innerHTML = `<h1>Статья не найдена</h1>
      <p class="muted" style="margin:12px 0 20px">Возможно, ссылка устарела.</p>
      <a class="btn btn-primary" href="articles.html">Ко всем статьям</a>`;
  } else {
    document.title = `${a.title} — приют «Лапки»`;   // динамический заголовок вкладки
    document.getElementById("crumb").textContent = a.title;
    const body = a.body.map(part =>
      Array.isArray(part) ? `<h2>${part[1]}</h2>` : `<p>${part}</p>`).join("");
    box.innerHTML = `
      <span class="cat" style="font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)">${a.cat}</span>
      <h1>${a.title}</h1>
      <div class="meta">Автор: <b>${a.author}</b> · ${a.date} · ${a.read} чтения</div>
      ${body}
      <a class="btn btn-ghost" href="articles.html" style="margin-top:14px">← Ко всем статьям</a>`;
  }
</script>
</body>
</html>
