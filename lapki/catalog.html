<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог питомцев — приют «Лапки»</title>
<meta name="description" content="Каталог питомцев приюта «Лапки»: кошки и собаки, ищущие дом. Фильтрация и сортировка.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="catalog.html">
<div id="header"></div>

<section class="section"><div class="container">
  <div class="breadcrumb" style="padding-top:0;padding-bottom:14px"><a href="index.html">Главная</a> / Каталог</div>
  <div class="sec-head" style="margin-bottom:24px"><div>
    <div class="kicker">Ищут дом</div>
    <h2>Каталог питомцев</h2>
  </div></div>

  <div class="toolbar">
    <div class="chips" id="chips">
      <button class="chip-btn active" data-f="all">Все</button>
      <button class="chip-btn" data-f="cat">Кошки</button>
      <button class="chip-btn" data-f="dog">Собаки</button>
    </div>
    <div class="select">
      <select id="sort">
        <option value="name">По имени (А–Я)</option>
        <option value="age">По возрасту</option>
        <option value="species">По виду</option>
      </select>
    </div>
  </div>

  <div class="pet-grid" id="grid"></div>
  <div class="pager" id="pager"></div>
</div></section>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  const PER_PAGE = 6;
  let filter = "all", sort = "name", page = 1;

  function ageNum(s){ return parseFloat(s) * (s.includes("мес")?0.0833:1); }

  function filtered(){
    let arr = LAPKI.PETS.filter(p => filter==="all" || p.species===filter);
    arr.sort((a,b)=>{
      if(sort==="name") return a.name.localeCompare(b.name,"ru");
      if(sort==="age") return ageNum(a.age)-ageNum(b.age);
      if(sort==="species") return a.species.localeCompare(b.species);
      return 0;
    });
    return arr;
  }

  function petCard(p){
    const i = p.id-1;
    const cover = LAPKI.COVERS[i % LAPKI.COVERS.length];
    return `<a class="pet-card" href="pet.html?id=${p.id}">
      <div class="pet-cover" style="background:${cover}">
        <span class="pet-badge">${p.status}</span>${LAPKI.animalSVG(p.species)}
      </div>
      <div class="pet-body">
        <h3>${p.name}</h3>
        <div class="pet-meta"><span class="tag">${p.speciesLabel}</span><span class="tag">${p.age}</span><span class="tag">${p.size}</span></div>
        <p>${p.desc.slice(0,80)}…</p>
        <span class="btn btn-ghost btn-sm">Подробнее →</span>
      </div></a>`;
  }

  function render(){
    const arr = filtered();
    const pages = Math.max(1, Math.ceil(arr.length/PER_PAGE));
    if(page>pages) page=pages;
    const slice = arr.slice((page-1)*PER_PAGE, page*PER_PAGE);
    document.getElementById("grid").innerHTML = slice.map(petCard).join("")
      || `<p class="muted">Питомцы не найдены.</p>`;

    // pager
    let html = `<button ${page===1?"disabled":""} data-p="${page-1}">←</button>`;
    for(let i=1;i<=pages;i++) html += `<button class="${i===page?"active":""}" data-p="${i}">${i}</button>`;
    html += `<button ${page===pages?"disabled":""} data-p="${page+1}">→</button>`;
    document.getElementById("pager").innerHTML = pages>1 ? html : "";
  }

  document.getElementById("chips").addEventListener("click", e=>{
    const b = e.target.closest(".chip-btn"); if(!b) return;
    document.querySelectorAll(".chip-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); filter=b.dataset.f; page=1; render();
  });
  document.getElementById("sort").addEventListener("change", e=>{ sort=e.target.value; render(); });
  document.getElementById("pager").addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b||b.disabled) return;
    page=+b.dataset.p; render(); window.scrollTo({top:0,behavior:"smooth"});
  });

  render();
</script>
</body>
</html>
