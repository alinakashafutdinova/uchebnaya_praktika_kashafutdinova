<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — приют «Лапки»</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="">
<div id="header"></div>

<div class="container">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Регистрация волонтёра</h1>
      <p class="sub">Создайте аккаунт волонтёра, чтобы подавать заявки и помогать приюту.</p>

      <div class="alert" id="err" style="background:#fbe3dc;border-color:#e7b3a6;color:#a23a22"></div>

      <div class="field" id="f-name">
        <label for="name">Имя *</label>
        <input type="text" id="name" placeholder="Как вас зовут">
      </div>
      <div class="field" id="f-email">
        <label for="email">E-mail *</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
      </div>
      <div class="field" id="f-pass">
        <label for="pass">Пароль * <span class="muted" style="font-weight:400">(минимум 4 символа)</span></label>
        <input type="password" id="pass" placeholder="••••••" autocomplete="new-password">
      </div>
      <div class="field" id="f-pass2">
        <label for="pass2">Повторите пароль *</label>
        <input type="password" id="pass2" placeholder="••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="btn" style="width:100%;justify-content:center">Зарегистрироваться</button>

      <p class="switch">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  if(Auth.current()) location.href = "cabinet.html";

  function submit(){
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const pass2 = document.getElementById("pass2").value;
    const err = document.getElementById("err");

    if(pass !== pass2){ err.textContent = "Пароли не совпадают."; err.classList.add("show"); return; }

    const res = Auth.register({ name, email, password: pass, role: "volunteer" });
    if(res.ok){ location.href = "cabinet.html"; }
    else { err.textContent = res.error; err.classList.add("show"); }
  }
  document.getElementById("btn").addEventListener("click", submit);
  document.getElementById("pass2").addEventListener("keydown", e => { if(e.key==="Enter") submit(); });
</script>
</body>
</html>
